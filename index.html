<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="KOVA Jewelry — Sculptural fine jewellery crafted for those who wear art. Explore our collections of 18k gold and statement pieces." />
    <meta property="og:title" content="KOVA Jewelry — Wear the Sculpture." />
    <meta property="og:description" content="Sculptural fine jewellery crafted for those who wear art." />
    <meta property="og:type" content="website" />
    <!-- theme-color: supported by Chrome/Edge/Safari; ignored gracefully by Firefox -->
    <meta name="theme-color" content="#0c0c12" />

    <title>KOVA Jewelry — Wear the Sculpture.</title>

    <!-- Google Fonts: Cormorant Garamond + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- CSS Design System -->
    <link rel="stylesheet" href="/src/styles/reset.css" />
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/global.css" />
    <link rel="stylesheet" href="/src/styles/cursor.css" />
    <link rel="stylesheet" href="/src/sections/preloader/preloader.css" />
    <link rel="stylesheet" href="/src/sections/nav/nav.css" />
    <link rel="stylesheet" href="/src/sections/hero/hero.css" />
  </head>
  <body>

    <!-- ════════════════════════════════════════ -->
    <!-- CUSTOM CURSOR                            -->
    <!-- ════════════════════════════════════════ -->
    <div id="cursor-dot" aria-hidden="true"></div>
    <div id="cursor-ring" aria-hidden="true"></div>

    <!-- ════════════════════════════════════════ -->
    <!-- APP SHELL                                -->
    <!-- ════════════════════════════════════════ -->
    <div id="kova-app">

      <!-- PRELOADER (Phase 1) -->
      <div id="preloader">
        <div class="pre-bg"></div>
        <svg class="pre-logo" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg" aria-label="KOVA">
          <!-- Stylised KOVA Logo paths to draw -->
          <path d="M50 20 L50 80 M50 50 L80 20 M50 50 L80 80" />
          <ellipse cx="140" cy="50" rx="25" ry="30" />
          <path d="M200 20 L225 80 L250 20" />
          <path d="M300 80 L325 20 L350 80 M312 50 L338 50" />
        </svg>
        <div class="pre-wipe"></div>
      </div>

      <!-- NAVIGATION (Phase 1) -->
      <nav class="site-nav">
        <a href="/" class="nav-brand" data-magnetic>KOVA</a>
        
        <div class="nav-links">
          <a href="#collections" class="nav-link" data-magnetic>Collections</a>
          <a href="#philosophy" class="nav-link" data-magnetic>Philosophy</a>
          <a href="#atelier" class="nav-link" data-magnetic>Atelier</a>
        </div>

        <button class="nav-toggle btn sr-only">Menu</button>
      </nav>

      <!-- ════════════════════════════════════════ -->
      <!-- HERO (Phase 2)                           -->
      <!-- ════════════════════════════════════════ -->
      <section id="hero" aria-label="Hero — Wear the Sculpture">

        <!-- Looping video background -->
        <div class="hero-video-wrap">
          <video
            class="hero-video"
            src="/assets/videos/hero-video.mp4"
            autoplay
            muted
            loop
            playsinline
            preload="auto"
            aria-hidden="true"
          >
            <!-- playsinline is required for iOS Safari autoplay; Firefox ignores it safely -->
          </video>
        </div>

        <!-- Copy block: lower-third -->
        <div class="hero-copy">
          <h1 class="hero-tagline">Wear the<br>sculpture.</h1>
          <p class="hero-subtitle">Sculptural fine jewellery &mdash; crafted for those who wear art.</p>
          <a href="#collections" class="hero-cta btn" data-magnetic id="hero-cta-explore">
            <span>Explore Collections</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </a>
        </div>

        <!-- Scroll indicator -->
        <div class="hero-scroll-hint" aria-hidden="true">
          <div class="hero-scroll-line"></div>
          <span>Scroll</span>
        </div>

      </section>

    </div>

    <!-- JS Entry -->
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
